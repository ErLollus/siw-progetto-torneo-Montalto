spring.application.name=torneo-calcio
# Connessione al Database
spring.datasource.url=jdbc:postgresql://localhost:5432/siw-progetto-torneo
spring.datasource.username=postgres
spring.datasource.password=postgres

# Configurazione JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8082

# Upload immagini (giocatori/squadre): cartella esterna + limiti dimensione
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB