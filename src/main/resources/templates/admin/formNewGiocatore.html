<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuovo Giocatore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow border-success">
                <div class="card-header bg-success text-white">
                    <h3 class="mb-0">Registra Nuovo Giocatore</h3>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/admin/giocatore}" th:object="${giocatore}" method="POST">

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Nome</label>
                                <input type="text" class="form-control" th:field="*{nome}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Cognome</label>
                                <input type="text" class="form-control" th:field="*{cognome}" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Data di Nascita</label>
                                <input type="date" class="form-control" th:field="*{dataNascita}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Altezza (cm)</label>
                                <input type="number" class="form-control" th:field="*{altezza}" placeholder="es. 185">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Ruolo</label>
                            <select class="form-select" th:field="*{ruolo}" required>
                                <option value="PORTIERE">Portiere</option>
                                <option value="DIFENSORE">Difensore</option>
                                <option value="CENTROCAMPISTA">Centrocampista</option>
                                <option value="ATTACCANTE">Attaccante</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Squadra</label>
                            <select class="form-select" th:field="*{squadra}">
                                <option th:value="${null}">Svincolato</option>
                                <option th:each="s : ${squadre}" th:value="${s.id}" th:text="${s.nome}"></option>
                            </select>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success btn-lg">Salva Giocatore</button>
                            <a th:href="@{/giocatori}" class="btn btn-outline-secondary">Annulla</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
