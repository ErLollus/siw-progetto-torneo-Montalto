<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Programma Partita</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h3 class="mb-0">Programmazione Nuovo Match</h3>
                </div>
                <div class="card-body bg-white">
                    <form th:action="@{/admin/partita}" th:object="${partita}" method="POST">

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Data e Ora</label>
                                <input type="datetime-local" class="form-control" th:field="*{dataOra}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Torneo</label>
                                <select class="form-select" th:field="*{torneo}" required>
                                    <option th:each="t : ${tornei}" th:value="${t.id}" th:text="${t.nome}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-4 bg-light p-3 rounded">
                            <div class="col-md-5">
                                <label class="form-label fw-bold text-primary">Squadra Casa</label>
                                <select class="form-select" th:field="*{squadraCasa}" required>
                                    <option th:each="s : ${squadre}" th:value="${s.id}" th:text="${s.nome}"></option>
                                </select>
                            </div>
                            <div class="col-md-2 text-center align-self-end">
                                <h4 class="mb-2">VS</h4>
                            </div>
                            <div class="col-md-5">
                                <label class="form-label fw-bold text-danger">Squadra Trasferta</label>
                                <select class="form-select" th:field="*{squadraTrasferta}" required>
                                    <option th:each="s : ${squadre}" th:value="${s.id}" th:text="${s.nome}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Arbitro Designato</label>
                            <select class="form-select" th:field="*{arbitro}" required>
                                <option th:each="a : ${arbitri}" th:value="${a.id}" th:text="${a.nome + ' ' + a.cognome}"></option>
                            </select>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg shadow-sm">Pubblica Partita nel Calendario</button>
                            <a th:href="@{/partite}" class="btn btn-outline-secondary">Torna alla lista</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
