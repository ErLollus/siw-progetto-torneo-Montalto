<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuova Squadra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-primary">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h3 class="mb-0">Nuova Squadra</h3>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/admin/squadra}" th:object="${squadra}" method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nome Squadra</label>
                            <input type="text" class="form-control" th:field="*{nome}" required>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-8">
                                <label class="form-label fw-bold">Città</label>
                                <input type="text" class="form-control" th:field="*{citta}" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Fondazione</label>
                                <input type="number" class="form-control" th:field="*{annoFondazione}" placeholder="1900">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold text-muted">Tornei</label>
                            <select class="form-select" th:field="*{tornei}" multiple>
                                <option th:each="t : ${tornei}" th:value="${t.id}" th:text="${t.nome}"></option>
                            </select>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">Registra</button>
                            <a th:href="@{/squadre}" class="btn btn-outline-secondary">Indietro</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
