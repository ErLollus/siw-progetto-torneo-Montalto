<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modifica Arbitro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-dark">
                <div class="card-header bg-dark text-white text-center">
                    <h3 class="mb-0">Dati Direttore di Gara</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/updateArbitro}" th:object="${arbitro}" method="POST">
                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label class="form-label fw-bold">Nome</label>
                            <input type="text" class="form-control" th:field="*{nome}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Cognome</label>
                            <input type="text" class="form-control" th:field="*{cognome}" required>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-dark">Salva Modifiche</button>
                            <a th:href="@{/arbitri}" class="btn btn-outline-secondary">Annulla</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
