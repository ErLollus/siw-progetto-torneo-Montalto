<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modifica Partita</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Gestione Match</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/updatePartita}" th:object="${partita}" method="POST">
                        <input type="hidden" th:field="*{id}" />
                        <input type="hidden" th:field="*{torneo}" />
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Data e Ora</label>
                                <input type="datetime-local" class="form-control" th:field="*{dataOra}" required />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Stato</label>
                                <select class="form-select" th:field="*{stato}">
                                    <option value="PROGRAMMATA">Programmata</option>
                                    <option value="TERMINATA">Terminata</option>
                                </select>
                            </div>
                        </div>

                        <div class="card bg-light mb-3">
                            <div class="card-body row text-center">
                                <div class="col-md-5">
                                    <label class="form-label">Squadra Casa</label>
                                    <select class="form-select mb-2" th:field="*{squadraCasa}">
                                        <option th:each="s : ${squadre}" th:value="${s.id}" th:text="${s.nome}"></option>
                                    </select>
                                    <input type="number" class="form-control text-center fs-4" th:field="*{goalsHome}" placeholder="Gol">
                                </div>
                                <div class="col-md-2 align-self-center mt-4"><h3>VS</h3></div>
                                <div class="col-md-5">
                                    <label class="form-label">Squadra Trasferta</label>
                                    <select class="form-select mb-2" th:field="*{squadraTrasferta}">
                                        <option th:each="s : ${squadre}" th:value="${s.id}" th:text="${s.nome}"></option>
                                    </select>
                                    <input type="number" class="form-control text-center fs-4" th:field="*{goalsAway}" placeholder="Gol">
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Arbitro</label>
                            <select class="form-select" th:field="*{arbitro}">
                                <option th:each="a : ${arbitri}" th:value="${a.id}" th:text="${a.nome + ' ' + a.cognome}"></option>
                            </select>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success btn-lg">Salva Modifiche</button>
                            <a th:href="@{/partite}" class="btn btn-outline-secondary">Annulla</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
