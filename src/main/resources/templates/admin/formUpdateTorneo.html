<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modifica Torneo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-warning">
                <div class="card-header bg-warning text-dark py-3">
                    <h3 class="mb-0 text-center">Modifica Dettagli Torneo</h3>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/admin/updateTorneo}" th:object="${torneo}" method="POST">
                        <input type="hidden" th:field="*{id}" />

                        <div class="row mb-3">
                            <div class="col-md-8">
                                <label class="form-label fw-bold">Nome Torneo</label>
                                <input type="text" class="form-control" th:field="*{nome}" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Anno</label>
                                <input type="number" class="form-control" th:field="*{anno}" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Descrizione Completa</label>
                            <textarea class="form-control" th:field="*{descrizione}" rows="5"></textarea>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-warning fw-bold text-dark">Aggiorna Torneo</button>
                            <a th:href="@{/tornei}" class="btn btn-outline-secondary">Annulla</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
