<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Nuovo giocatore')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">
            <div class="card card-soft p-4">
                <h1 class="section-title h4 mb-4"><i class="bi bi-person-plus text-brand me-2"></i>Nuovo giocatore</h1>
                <form th:action="@{/admin/giocatore}" th:object="${giocatore}" method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label">Foto (opzionale)</label>
                        <input type="file" name="immagineFile" class="form-control" accept="image/*">
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Nome</label>
                            <input type="text" class="form-control" th:field="*{nome}">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Cognome</label>
                            <input type="text" class="form-control" th:field="*{cognome}">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('cognome')}" th:errors="*{cognome}"></div>
                        </div>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Data di nascita</label>
                            <input type="date" class="form-control" th:field="*{dataNascita}">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('dataNascita')}" th:errors="*{dataNascita}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Altezza (cm)</label>
                            <input type="number" class="form-control" th:field="*{altezza}">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('altezza')}" th:errors="*{altezza}"></div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Ruolo</label>
                        <select class="form-select" th:field="*{ruolo}">
                            <option value="">-- Seleziona --</option>
                            <option value="PORTIERE">Portiere</option>
                            <option value="DIFENSORE">Difensore</option>
                            <option value="CENTROCAMPISTA">Centrocampista</option>
                            <option value="ATTACCANTE">Attaccante</option>
                        </select>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('ruolo')}" th:errors="*{ruolo}"></div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Squadra</label>
                        <select class="form-select" th:field="*{squadra}">
                            <option th:value="${null}">Svincolato</option>
                            <option th:each="s : ${squadre}" th:value="${s.id}" th:text="${s.nome}"></option>
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-brand">Salva giocatore</button>
                        <a th:href="@{/giocatori}" class="btn btn-outline-secondary">Annulla</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
