<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Modifica torneo')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main class="container">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="card card-soft p-4">
                <h1 class="section-title h4 mb-4"><i class="bi bi-pencil-square text-brand me-2"></i>Modifica torneo</h1>
                <form th:action="@{/admin/updateTorneo}" th:object="${torneo}" method="post">
                    <input type="hidden" th:field="*{id}">
                    <div class="row g-3 mb-3">
                        <div class="col-md-8">
                            <label class="form-label">Nome</label>
                            <input type="text" class="form-control" th:field="*{nome}">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Anno</label>
                            <input type="number" class="form-control" th:field="*{anno}">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('anno')}" th:errors="*{anno}"></div>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Descrizione</label>
                        <textarea class="form-control" th:field="*{descrizione}" rows="4"></textarea>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('descrizione')}" th:errors="*{descrizione}"></div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-brand">Salva modifiche</button>
                        <a th:href="@{/tornei}" class="btn btn-outline-secondary">Annulla</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
