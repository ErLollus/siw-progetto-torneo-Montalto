<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Anagrafica Arbitri</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h2 class="mb-0">Albo Arbitri</h2>
            <a th:href="@{/}" class="btn btn-outline-light btn-sm">Torna alla Home</a>
        </div>
        <div class="card-body p-0"> <table class="table table-bordered table-hover mb-0 w-100">
            <thead class="table-secondary">
            <tr>
                <th class="p-3">Nome</th>
                <th class="p-3">Cognome</th>
                <th class="p-3 text-center" style="width: 250px;">Gestione</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="arbitro : ${arbitri}">
                <td class="p-3" th:text="${arbitro.nome}"></td>
                <td class="p-3" th:text="${arbitro.cognome}"></td>
                <td class="p-3 text-center">
                    <a th:href="@{'/admin/formUpdateArbitro/' + ${arbitro.id}}"
                       class="btn btn-primary btn-sm px-3">Modifica</a>
                    <a th:href="@{'/admin/deleteArbitro/' + ${arbitro.id}}"
                       class="btn btn-danger btn-sm px-3"
                       onclick="return confirm('Eliminare l\'arbitro?')">Elimina</a>
                </td>
            </tr>
            </tbody>
        </table>
        </div>
        <div class="card-footer bg-white text-end py-3">
            <a th:href="@{/admin/formNewArbitro}" class="btn btn-dark fw-bold">
                <i class="bi bi-person-badge-fill me-1"></i>Inserisci Nuovo Arbitro
            </a>
        </div>
    </div>

    <div class="mt-3 text-end">
        <p class="text-muted small">Totale arbitri registrati: <span th:text="${#lists.size(arbitri)}">0</span></p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
