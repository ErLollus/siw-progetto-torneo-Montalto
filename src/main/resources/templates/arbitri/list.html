<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Arbitri')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="section-title h3 mb-0"><i class="bi bi-person-badge text-brand me-2"></i>Albo arbitri</h1>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/formNewArbitro}" class="btn btn-brand">
            <i class="bi bi-plus-lg me-1"></i>Nuovo arbitro
        </a>
    </div>

    <div class="card card-soft">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th>Nome</th>
                    <th>Cognome</th>
                    <th>Codice arbitrale</th>
                    <th sec:authorize="hasRole('ADMIN')" class="text-end">Azioni</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="arbitro : ${arbitri}">
                    <td th:text="${arbitro.nome}"></td>
                    <td class="fw-semibold" th:text="${arbitro.cognome}"></td>
                    <td><span class="badge badge-soft" th:text="${arbitro.codiceArbitrale}"></span></td>
                    <td sec:authorize="hasRole('ADMIN')" class="text-end">
                        <a th:href="@{'/admin/formUpdateArbitro/' + ${arbitro.id}}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-pencil"></i></a>
                        <a th:href="@{'/admin/deleteArbitro/' + ${arbitro.id}}" class="btn btn-outline-danger btn-sm"
                           onclick="return confirm('Eliminare l\'arbitro?')"><i class="bi bi-trash"></i></a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(arbitri)}">
                    <td colspan="4" class="text-center text-muted py-4">Nessun arbitro registrato.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
