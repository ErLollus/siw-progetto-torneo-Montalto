<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Classifica Torneo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h2 class="mb-0">Classifica: <span th:text="${torneo.nome}"></span></h2>
            <a th:href="@{/tornei}" class="btn btn-outline-light btn-sm">Torna ai Tornei</a>
        </div>
        <div class="card-body">
            <table class="table table-striped table-hover text-center align-middle">
                <thead class="table-dark">
                <tr>
                    <th>Pos.</th>
                    <th class="text-start">Squadra</th>
                    <th>PT</th>
                    <th>PG</th>
                    <th>V</th>
                    <th>N</th>
                    <th>P</th>
                    <th>GF</th>
                    <th>GS</th>
                    <th>DR</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="s, iter : ${classifica}">
                    <td class="fw-bold" th:text="${iter.count}"></td>
                    <td class="text-start fw-bold" th:text="${s.nome}"></td>
                    <td class="table-primary fw-bold" th:text="${s.punti}"></td>
                    <td th:text="${s.giocate}"></td>
                    <td th:text="${s.vittorie}"></td>
                    <td th:text="${s.pareggi}"></td>
                    <td th:text="${s.sconfitte}"></td>
                    <td th:text="${s.golFatti}"></td>
                    <td th:text="${s.golSubiti}"></td>
                    <td th:text="${s.diffReti}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
