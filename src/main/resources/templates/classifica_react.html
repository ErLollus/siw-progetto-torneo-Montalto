<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Classifica Live React</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-light">

<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
        const [classifica, setClassifica] = useState([]);
        const [caricamento, setCaricamento] = useState(true);
        // Recuperiamo l'ID del torneo dall'URL (es: /torneo/1/classifica-react)
        const torneoId = window.location.pathname.split('/')[2];

        useEffect(() => {
            fetch(`/api/classifica/${torneoId}`)
                .then(res => res.json())
                .then(data => {
                    setClassifica(data);
                    setCaricamento(false);
                })
                .catch(err => console.error("Errore nel caricamento:", err));
        }, []);

        if (caricamento) return (
            <div class="container mt-5 text-center">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2">Caricamento dati in corso...</p>
            </div>
        );

        return (
            <div className="container mt-5">
                <div className="card shadow border-0">
                    <div className="card-header bg-primary text-white d-flex justify-content-between align-items-center py-3">
                        <h3 className="mb-0"><i className="bi bi-cpu-fill me-2"></i>Classifica React Engine</h3>
                        <a href="/tornei" className="btn btn-light btn-sm fw-bold">Esci</a>
                    </div>
                    <div className="card-body">
                        <table className="table table-hover text-center align-middle">
                            <thead className="table-dark">
                            <tr>
                                <th>Squadra</th>
                                <th>PT</th>
                                <th>G</th>
                                <th>V</th>
                                <th>N</th>
                                <th>P</th>
                                <th>GF</th>
                                <th>GS</th>
                                <th>DR</th>
                            </tr>
                            </thead>
                            <tbody>
                            {classifica.map((s, i) => (
                                <tr key={i}>
                                    <td className="text-start fw-bold text-primary">
                                        <a href={`/squadra/${s.id}`} style={{textDecoration: 'none'}}>{s.nome}</a>
                                    </td>
                                    <td className="fw-bold fs-5">{s.punti}</td>
                                    <td>{s.giocate}</td>
                                    <td className="text-success">{s.vittorie}</td>
                                    <td className="text-warning">{s.pareggi}</td>
                                    <td className="text-danger">{s.sconfitte}</td>
                                    <td>{s.golFatti}</td>
                                    <td>{s.golSubiti}</td>
                                    <td className={s.diffReti >= 0 ? "text-success" : "text-danger"}>
                                        {s.diffReti > 0 ? `+${s.diffReti}` : s.diffReti}
                                    </td>
                                </tr>
                            ))}
                            </tbody>
                        </table>
                    </div>
                    <div className="card-footer text-muted small text-center">
                        Dati caricati via API REST da Spring Boot
                    </div>
                </div>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
