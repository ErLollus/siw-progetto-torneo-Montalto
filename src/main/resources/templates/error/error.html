<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Errore')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container">
    <div class="row justify-content-center">
        <div class="col-md-7 text-center">
            <div class="card card-soft p-5">
                <i class="bi bi-exclamation-triangle text-warning" style="font-size:3rem"></i>
                <h1 class="section-title h4 mt-3" th:text="${titolo} ?: 'Si è verificato un errore'">Errore</h1>
                <p class="text-muted" th:text="${messaggio} ?: 'Qualcosa è andato storto.'"></p>
                <p class="small text-muted" th:if="${dettaglio}" th:text="${dettaglio}"></p>
                <div>
                    <a th:href="@{/}" class="btn btn-brand">Torna alla home</a>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
