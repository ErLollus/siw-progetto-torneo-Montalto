<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(titolo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titolo} + ' · SiwTorneo'">SiwTorneo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- ===================== NAVBAR ===================== -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-siw sticky-top mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <span class="brand-badge"><i class="bi bi-trophy-fill"></i></span>SiwTorneo
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav mx-auto gap-1">
                <li class="nav-item"><a class="nav-link" th:href="@{/tornei}"><i class="bi bi-trophy me-1"></i>Tornei</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/squadre}"><i class="bi bi-shield me-1"></i>Squadre</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/giocatori}"><i class="bi bi-people me-1"></i>Giocatori</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/partite}"><i class="bi bi-calendar-event me-1"></i>Partite</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/arbitri}"><i class="bi bi-person-badge me-1"></i>Arbitri</a></li>
            </ul>
            <div class="d-flex align-items-center gap-2">
                <span sec:authorize="isAuthenticated()" class="text-muted small">
                    <i class="bi bi-person-circle me-1"></i><span sec:authentication="name">Utente</span>
                    <span sec:authorize="hasRole('ADMIN')" class="badge badge-soft ms-1">ADMIN</span>
                </span>
                <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()" class="m-0">
                    <button class="btn btn-outline-brand btn-sm" type="submit">Esci</button>
                </form>
                <a sec:authorize="!isAuthenticated()" th:href="@{/login}" class="btn btn-outline-brand btn-sm">Accedi</a>
                <a sec:authorize="!isAuthenticated()" th:href="@{/register}" class="btn btn-brand btn-sm">Registrati</a>
            </div>
        </div>
    </div>
</nav>

<!-- ===================== FOOTER ===================== -->
<footer th:fragment="footer" class="siw-footer mt-5 pt-4 pb-4 text-center border-top">
    <div class="container">
        <p class="mb-0">&copy; 2026 SiwTorneo — Sistemi Informativi su Web · Università Roma Tre · Lorenzo Montalto</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</footer>

</body>
</html>
