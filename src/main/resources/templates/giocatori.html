<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestione Giocatori</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-success text-white d-flex justify-content-between align-items-center py-3">
            <h2 class="mb-0"><i class="bi bi-people-fill me-2"></i>Anagrafica Giocatori</h2>
            <a th:href="@{/}" class="btn btn-light btn-sm fw-bold">Home</a>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th>Nome e Cognome</th>
                        <th>Data Nascita</th>
                        <th>Ruolo</th>
                        <th>Altezza</th>
                        <th>Squadra</th>
                        <th class="text-center">Azioni</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="giocatore : ${giocatori}">
                        <td class="fw-bold" th:text="${giocatore.nome + ' ' + giocatore.cognome}"></td>
                        <td th:text="${#temporals.format(giocatore.dataNascita, 'dd/MM/yyyy')}"></td>
                        <td><span class="badge bg-info text-dark" th:text="${giocatore.ruolo}"></span></td>
                        <td th:text="${giocatore.altezza + ' cm'}"></td>
                        <td>
                            <span th:if="${giocatore.squadra != null}" class="badge bg-secondary" th:text="${giocatore.squadra.nome}"></span>
                            <span th:unless="${giocatore.squadra != null}" class="text-muted small italic">Svincolato</span>
                        </td>
                        <td class="text-center">
                            <div class="btn-group">
                                <a th:href="@{'/admin/formUpdateGiocatore/' + ${giocatore.id}}" class="btn btn-outline-primary btn-sm">Modifica</a>
                                <a th:href="@{'/admin/deleteGiocatore/' + ${giocatore.id}}" class="btn btn-outline-danger btn-sm" onclick="return confirm('Eliminare?')">Elimina</a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer bg-white text-end py-3">
            <a th:href="@{/admin/formNewGiocatore}" class="btn btn-success fw-bold">Aggiungi Giocatore</a>
        </div>
    </div>
</div>
</body>
</html>
