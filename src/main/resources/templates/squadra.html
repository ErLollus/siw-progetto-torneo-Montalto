<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${squadra.nome}">Dettaglio Squadra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow p-4 mb-4">
        <div class="d-flex align-items-center justify-content-between">
            <div>
                <h1 class="display-4 text-primary" th:text="${squadra.nome}">Nome Squadra</h1>
                <p class="lead">
                    <span class="badge bg-secondary" th:text="'Fondata nel ' + ${squadra.annoFondazione}">Anno</span>
                    <span class="badge bg-info text-dark" th:text="${squadra.citta}">Città</span>
                </p>
            </div>
            <a href="/tornei" class="btn btn-outline-secondary">Torna ai Tornei</a>
        </div>
    </div>

    <h2 class="mb-3">Rosa Giocatori</h2>
    <div class="row">
        <div th:each="giocatore : ${giocatori}" class="col-md-4 mb-3">
            <div class="card h-100 shadow-sm border-start border-primary border-4">
                <div class="card-body">
                    <h5 class="card-title" th:text="${giocatore.nome} + ' ' + ${giocatore.cognome}">Nome Cognome</h5>
                    <p class="card-text">
                        <strong>Ruolo:</strong> <span th:text="${giocatore.ruolo}">Ruolo</span><br>
                        <strong>Altezza:</strong> <span th:text="${giocatore.altezza} + ' cm'">180 cm</span><br>
                        <strong>Nascita:</strong> <span th:text="${#temporals.format(giocatore.dataNascita, 'dd/MM/yyyy')}">01/01/2000</span>
                    </p>
                </div>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(giocatori)}" class="col-12">
            <div class="alert alert-warning">Non ci sono ancora giocatori registrati per questa squadra.</div>
        </div>
    </div>
</div>
</body>
</html>
