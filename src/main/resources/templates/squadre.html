<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestione Squadre</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center py-3">
            <h2 class="mb-0">Squadre</h2>
            <a th:href="@{/}" class="btn btn-light btn-sm">Home</a>
        </div>
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th>Nome</th>
                    <th>Città</th>
                    <th>Fondazione</th>
                    <th>Tornei</th>
                    <th class="text-center">Azioni</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="squadra : ${squadre}">
                    <td class="fw-bold" th:text="${squadra.nome}"></td>
                    <td th:text="${squadra.citta}"></td>
                    <td th:text="${squadra.annoFondazione}"></td>
                    <td>
                        <span th:each="t : ${squadra.tornei}" th:text="${t.nome}" class="badge bg-primary me-1"></span>
                    </td>
                    <td class="text-center">
                        <div class="btn-group">
                            <a th:href="@{'/admin/formUpdateSquadra/' + ${squadra.id}}" class="btn btn-outline-primary btn-sm">Modifica</a>
                            <a th:href="@{'/admin/deleteSquadra/' + ${squadra.id}}" class="btn btn-outline-danger btn-sm">Elimina</a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="card-footer bg-white text-end py-3">
            <a th:href="@{/admin/formNewSquadra}" class="btn btn-success fw-bold">Nuova Squadra</a>
        </div>
    </div>
</div>
</body>
</html>
