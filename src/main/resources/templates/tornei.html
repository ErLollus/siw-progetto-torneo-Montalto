<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestione Tornei</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center py-3">
            <h2 class="mb-0"><i class="bi bi-trophy-fill me-2"></i>Gestione Tornei</h2>
            <a th:href="@{/}" class="btn btn-outline-light btn-sm">
                <i class="bi bi-house-door"></i> Home
            </a>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-secondary">
                    <tr>
                        <th>Nome</th>
                        <th>Anno</th>
                        <th style="width: 35%;">Descrizione</th>
                        <th class="text-center">Azioni</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="torneo : ${tornei}">
                        <td class="fw-bold" th:text="${torneo.nome}"></td>
                        <td th:text="${torneo.anno}"></td>
                        <td class="small text-muted" th:text="${torneo.descrizione}"></td>
                        <td class="text-center">
                            <div class="btn-group shadow-sm">
                                <a th:href="@{'/torneo/' + ${torneo.id} + '/classifica-react'}" class="btn btn-info btn-sm text-white">
                                    <i class="bi bi-cpu"></i> Classifica React
                                </a>

                                <a th:href="@{'/admin/formUpdateTorneo/' + ${torneo.id}}"
                                   class="btn btn-primary btn-sm"
                                   title="Modifica">
                                    <i class="bi bi-pencil"></i> Modifica
                                </a>

                                <a th:href="@{'/admin/deleteTorneo/' + ${torneo.id}}"
                                   class="btn btn-danger btn-sm"
                                   title="Elimina"
                                   onclick="return confirm('Sei sicuro di voler eliminare questo torneo?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(tornei)}">
                        <td colspan="4" class="text-center py-4 text-muted">
                            Nessun torneo presente nel sistema.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer bg-white text-end py-3">
            <a th:href="@{/admin/formNewTorneo}" class="btn btn-success fw-bold">
                <i class="bi bi-plus-circle me-1"></i> Crea Nuovo Torneo
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
