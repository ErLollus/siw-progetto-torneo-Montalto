<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(${torneo.nome})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container">
    <section class="hero p-4 p-md-5 mb-4">
        <div class="position-relative">
            <span class="badge badge-soft mb-2" th:text="'Edizione ' + ${torneo.anno}">2026</span>
            <h1 class="mb-2" th:text="${torneo.nome}">Torneo</h1>
            <p class="opacity-75 mb-3" th:text="${torneo.descrizione}">Descrizione</p>
            <div class="d-flex gap-2 flex-wrap">
                <a th:href="@{'/torneo/' + ${torneo.id} + '/classifica'}" class="btn btn-light fw-bold">Classifica</a>
                <a th:href="@{'/torneo/' + ${torneo.id} + '/classifica-react'}" class="btn btn-outline-light fw-bold">
                    <i class="bi bi-cpu me-1"></i>Classifica (React)
                </a>
            </div>
        </div>
    </section>

    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card card-soft h-100 p-4">
                <h2 class="section-title h5 mb-3"><i class="bi bi-shield-shaded text-brand me-2"></i>Squadre partecipanti</h2>
                <ul class="list-group list-group-flush">
                    <li th:each="s : ${torneo.squadre}" class="list-group-item d-flex align-items-center gap-2 px-0">
                        <span class="dot" th:style="'background-color:' + (${s.coloreMaglia} ?: '#ccc')"></span>
                        <a th:href="@{'/squadra/' + ${s.id}}" class="text-decoration-none fw-semibold" th:text="${s.nome}"></a>
                        <span class="ms-auto text-muted small" th:text="${s.citta}"></span>
                    </li>
                    <li th:if="${#lists.isEmpty(torneo.squadre)}" class="list-group-item px-0 text-muted">Nessuna squadra iscritta.</li>
                </ul>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="card card-soft h-100 p-4">
                <h2 class="section-title h5 mb-3"><i class="bi bi-calendar-event text-brand me-2"></i>Calendario partite</h2>
                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <tbody>
                        <tr th:each="p : ${torneo.partite}">
                            <td class="small text-muted" th:text="${#temporals.format(p.dataOra, 'dd/MM HH:mm')}"></td>
                            <td class="fw-semibold" th:text="${p.squadraCasa != null ? p.squadraCasa.nome : '-'}"></td>
                            <td class="text-center">
                                <span class="badge text-bg-dark"
                                      th:text="(${p.goalsHome != null ? p.goalsHome : '-'}) + ' : ' + (${p.goalsAway != null ? p.goalsAway : '-'})"></span>
                            </td>
                            <td class="fw-semibold text-end" th:text="${p.squadraTrasferta != null ? p.squadraTrasferta.nome : '-'}"></td>
                            <td class="text-end">
                                <a th:href="@{'/partita/' + ${p.id}}" class="btn btn-outline-brand btn-sm"><i class="bi bi-chat-dots"></i></a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(torneo.partite)}"><td class="text-muted py-3">Nessuna partita programmata.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
