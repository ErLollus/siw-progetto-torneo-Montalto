# Configurazione usata SOLO durante i test: database H2 in-memory,
# così i test (incluso quello di analisi N+1) girano senza PostgreSQL.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# Abilita le statistiche Hibernate: le usiamo per contare le query nell'analisi N+1
spring.jpa.properties.hibernate.generate_statistics=true
spring.jpa.show-sql=false
